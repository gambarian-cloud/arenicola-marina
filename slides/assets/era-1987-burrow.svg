<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="0 0 500 500">
 <title>lugworm borrow section</title>
 <desc>Simplified cross-section of a lugworm burrow by CMG Lee.</desc>
 <filter id="filter_noise">
  <feTurbulence type="fractalNoise" baseFrequency="0.5"/>
  <feBlend in="SourceGraphic" mode="multiply"/>
  <feComposite operator="in" in2="SourceAlpha"/>
 </filter>
 <circle cx="0" cy="0" r="99999" fill="#ffffff"/>
 <g font-family="Helvetica,Arial,sans-serif" font-size="40" text-anchor="middle" fill="none" stroke="none" stroke-linejoin="round" stroke-linecap="round">
  <g filter="url(#filter_noise)">
   <path d="M 100,100 c -30,-80 40,-60 0,-40 c -80,0 80,0 0,20 c -100,20 120,20 -20,-8" stroke="#ffcc99" stroke-width="10"/>
   <path d="M 0,100 H 350 l 50,50 l 50,-50 H 500 V 500 H 0 Z" fill="#ffcc99"/>
  <path d="M                         370,400 Q 100,400 100,300 V 110" stroke="#00cc99" stroke-width="20"/>
  <path d="M 400,140 V 380 Q 400,400 370,400 Q 100,400 100,300 V 100" stroke="#ffffff" stroke-width="16" stroke-linecap="butt"/>
  </g>
  <path d="M                         370,400 Q 100,400 100,300      " stroke="#cc6666" stroke-width="16"/>
  <path id="arrow" d="M 100,150 v 40 m -5,-20 l 5,20 l 5,-20" stroke="#000000"/>
  <use xlink:href="#arrow" transform="translate(500,500) rotate(180)"/>
  <g fill="#000000">
   <text transform="translate(180, 60)" y="0.6ex"><tspan>Cast</tspan></text>
   <text transform="translate(400, 40)" y="0.6ex"><tspan>Feeding</tspan><tspan x="0" dy="1em">pit</tspan></text>
   <text transform="translate(170,150)" y="0.6ex"><tspan>Water</tspan><tspan x="0" dy="1em">flow</tspan></text>
   <text transform="translate(200,280)" y="0.6ex"><tspan>L-shaped</tspan><tspan x="0" dy="1em">gallery</tspan></text>
   <text transform="translate(330,180)" y="0.6ex"><tspan>Head</tspan><tspan x="0" dy="1em">shaft</tspan></text>
   <text transform="translate( 60,340)" y="0.6ex"><tspan>Tail</tspan></text>
   <text transform="translate(160,420)" y="0.6ex"><tspan>Lugworm</tspan></text>
   <text transform="translate(340,440)" y="0.6ex"><tspan>Head</tspan></text>
  </g>
 </g>
</svg>
